<style>
:root {
  --ink: #0d0d0d; --ink2: #141414; --ink3: #1a1a1a;
  --paper: #f4f0e8; --paper2: #ede8dc;
  --grass: #2d6a3f;
  --sun: #d4a055; --sun2: #b8843a;
  --font-head: 'Anton', sans-serif;
  --font-serif: 'Instrument Serif', serif;
  --font-body: 'Outfit', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body { background: var(--ink); color: var(--paper); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
a { text-decoration: none; color: inherit; cursor: pointer; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: 16px 52px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(13,13,13,0.96); backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
}
.nav-center-home { display: flex; align-items: center; gap: 6px; position: absolute; left: 50%; transform: translateX(-50%); z-index: 1; }
.nav-center-home a { color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; padding: 6px 12px; border-radius: 100px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.nav-center-home a:hover { color: #fff; background: rgba(255,255,255,0.08); }
nav .active { color: var(--sun) !important; background: rgba(255,255,255,0.08); }
.nav-hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; width: 32px; height: 32px; }
.nav-hamburger span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s; }
.mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: rgba(13,13,13,0.97); backdrop-filter: blur(16px); z-index: 999; padding: 24px 32px 32px; flex-direction: column; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.mobile-menu a { font-size: 22px; font-family: var(--font-head); letter-spacing: 3px; color: rgba(255,255,255,0.8); text-decoration: none; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s; }
.mobile-menu a:hover { color: var(--sun); }
.mobile-menu.open { display: flex; }
@media(max-width:960px) { .nav-hamburger { display: flex; } .nav-center-home { display: none !important; } }

/* ── HERO ── */
.dest-hero {
  position: relative; min-height: 88vh;
  display: flex; align-items: flex-end;
  padding: 0 80px 80px;
  overflow: hidden;
}
.dest-hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.6s ease;
}
.dest-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(13,13,13,0.08) 0%, rgba(13,13,13,0.5) 55%, rgba(13,13,13,0.88) 100%);
}
.dest-hero-content { position: relative; z-index: 2; max-width: 860px; }
.dest-location-tags { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.dest-location-tag {
  background: rgba(212,160,85,0.15); color: var(--sun);
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 5px 13px; border-radius: 4px; font-weight: 600;
}
.dest-hero-name {
  font-family: var(--font-head);
  font-size: clamp(52px, 8vw, 110px);
  line-height: 0.9; letter-spacing: 2px; color: var(--paper);
  margin-bottom: 20px;
}
.dest-hero-tagline {
  font-family: var(--font-serif); font-style: italic;
  font-size: clamp(16px, 2vw, 22px); color: var(--sun);
  line-height: 1.45; max-width: 640px;
}

/* ── SECTION CHROME ── */
.dest-section {
  padding: 72px 80px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.dest-section-inner { max-width: 1180px; margin: 0 auto; }
.dest-section--narrow .dest-section-inner { max-width: 860px; }
.dest-section-label-wrap {
  display: flex; align-items: center; gap: 14px; margin-bottom: 32px;
}
.dest-section-label-wrap::before {
  content: ''; display: block;
  width: 24px; height: 2px; background: var(--sun); flex-shrink: 0;
}
.dest-section-label {
  font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--sun); font-weight: 600; font-family: var(--font-body);
}

/* ── AT A GLANCE ── */
.dest-glance-section {
  padding: 36px 80px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.015);
}
.dest-glance-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}
.dest-glance-cell {
  background: var(--ink2);
  padding: 24px 26px 22px;
  display: flex; flex-direction: column; gap: 8px; min-height: 110px;
  position: relative;
}
.dest-glance-cell::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--sun);
}
.dest-glance-cell:nth-child(odd)::before { background: var(--grass); }
.dest-glance-label {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--sun); font-weight: 600;
}
.dest-glance-cell:nth-child(odd) .dest-glance-label { color: #6ba87c; }
.dest-glance-value {
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  color: #f4f0e8; line-height: 1.45; letter-spacing: 0;
}
.dest-glance-detail {
  font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.45;
  font-family: var(--font-serif); font-style: italic; letter-spacing: 0.04em;
}

/* ── THE TAKE ── */
.dest-take-body p {
  font-size: 17px; color: #e8e4d8; line-height: 1.78;
  margin-bottom: 22px;
}
.dest-take-body p:last-child { margin-bottom: 0; }

/* ── COURSES ── */
.dest-courses-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
}
.dest-courses-grid:has(> .dest-course-card:only-child) {
  grid-template-columns: 1fr;
  max-width: 480px;
  margin: 0 auto;
}
.dest-course-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid var(--grass);
  border-radius: 10px;
  overflow: hidden;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.dest-course-card:hover {
  background: rgba(255,255,255,0.04);
  border-color: rgba(212,160,85,0.25);
  border-left-color: var(--sun);
}
.dest-course-image {
  width: 100%; aspect-ratio: 16/9;
  background-size: cover; background-position: center;
  background-color: rgba(255,255,255,0.04);
  transition: transform 0.4s ease;
}
.dest-course-card:hover .dest-course-image { transform: scale(1.03); }
.dest-course-image-wrap {
  width: 100%; overflow: hidden;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.dest-course-img-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.45); color: #fff; border: none;
  width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
  cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; line-height: 1;
}
.dest-course-img-arrow:hover { background: rgba(0,0,0,0.7); }
.dest-course-img-arrow--prev { left: 10px; }
.dest-course-img-arrow--next { right: 10px; }
.dest-course-body { padding: 22px 24px 24px; }
.dest-course-name {
  font-family: var(--font-head); font-size: 22px; letter-spacing: 1px;
  color: var(--paper); margin-bottom: 4px;
}
.dest-course-designer {
  font-family: var(--font-serif); font-style: italic;
  font-size: 14px; color: var(--sun); margin-bottom: 12px;
}
.dest-course-desc { font-size: 15px; color: #d4d0c4; line-height: 1.68; }

/* ── WHERE TO STAY ── */
.dest-stay-body {
  font-size: 17px; color: #e8e4d8; line-height: 1.78;
  margin-bottom: 28px;
}
.dest-booking-btn {
  display: inline-flex; align-items: center;
  background: transparent; color: var(--sun);
  border: 1.5px solid var(--sun);
  font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
  font-weight: 600; padding: 14px 30px; border-radius: 8px;
  transition: background 0.2s, color 0.2s; font-family: var(--font-body);
}
.dest-booking-btn:hover { background: var(--sun); color: var(--ink); }

/* ── THE SETUP ── */
.dest-setup-items { display: flex; flex-direction: column; gap: 14px; }
.dest-setup-item {
  background: rgba(212,160,85,0.06); border-radius: 10px;
  padding: 22px 26px;
}
.dest-setup-label {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--sun); font-weight: 600; margin-bottom: 8px;
}
.dest-setup-text { font-size: 15px; color: #e8e4d8; line-height: 1.65; }

/* ── KNOW BEFORE YOU GO ── */
.dest-kbyg-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px;
}
.dest-kbyg-item {
  grid-column: span 2;
  background: rgba(212,160,85,0.05);
  border: 1px solid rgba(212,160,85,0.18);
  border-radius: 10px;
  padding: 22px 24px;
}
/* When there are exactly 5 items, the last two span 3 cols each
   so the layout reads as 3 over 2 (centered second row). */
.dest-kbyg-item:nth-child(4):nth-last-child(2),
.dest-kbyg-item:nth-child(4):nth-last-child(2) ~ .dest-kbyg-item {
  grid-column: span 3;
}
.dest-kbyg-label {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--sun); font-weight: 600; margin-bottom: 10px;
  padding-bottom: 10px; border-bottom: 1px solid rgba(212,160,85,0.2);
}
.dest-kbyg-value { font-size: 14.5px; color: #f0ece0; line-height: 1.6; }

/* ── WHAT TO SKIP ── */
.dest-skip-items { display: flex; flex-direction: column; gap: 22px; }
.dest-skip-lead {
  font-size: 16px; color: var(--sun); font-weight: 600; margin-bottom: 4px;
}
.dest-skip-detail { font-size: 15px; color: #d4d0c4; line-height: 1.68; }

/* ── GALLERY ── */
.dest-gallery-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
.dest-gallery-item {
  aspect-ratio: 1; overflow: hidden; border-radius: 8px;
  position: relative; cursor: pointer; display: block;
}
.dest-gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.3s ease;
}
.dest-gallery-item:hover img { transform: scale(1.05); }
.gallery-more-overlay {
  position: absolute; inset: 0; background: rgba(13,13,13,0.68);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-size: 30px; color: #fff; letter-spacing: 2px;
  pointer-events: none;
}
.dest-gallery-empty {
  font-family: var(--font-serif); font-style: italic;
  font-size: 15px; color: rgba(255,255,255,0.3);
}

/* ── EMAIL CTA ── */
.dest-email-cta-section { padding: 80px; }
.dest-email-cta-inner {
  max-width: 600px; margin: 0 auto;
  background: rgba(212,160,85,0.08);
  border: 1px solid rgba(212,160,85,0.3);
  border-radius: 16px; padding: 56px 48px; text-align: center;
}
.dest-cta-eyebrow {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--sun); margin-bottom: 12px;
}
.dest-cta-headline {
  font-family: var(--font-head); font-size: clamp(26px, 3.5vw, 38px);
  color: var(--paper); letter-spacing: 2px; margin-bottom: 12px;
}
.dest-cta-sub {
  font-size: 15px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-bottom: 28px;
}
.dest-cta-form { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.dest-cta-input {
  flex: 1; min-width: 200px; max-width: 280px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; color: #fff; font-family: var(--font-body); font-size: 14px;
  padding: 13px 16px; outline: none;
}
.dest-cta-input:focus { border-color: rgba(212,160,85,0.5); }
.dest-cta-btn {
  background: var(--sun); color: var(--ink);
  border: none; cursor: pointer; border-radius: 6px;
  font-family: var(--font-head); font-size: 13px; letter-spacing: 2px;
  padding: 13px 24px; transition: background 0.2s; white-space: nowrap;
}
.dest-cta-btn:hover { background: var(--sun2); }
.dest-cta-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.dest-cta-success-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.dest-cta-check {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1.5px solid var(--sun); display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--sun); margin-bottom: 4px;
}
.dest-cta-success-hed {
  font-family: var(--font-head); font-size: 28px; letter-spacing: 2px; color: var(--paper);
}
.dest-cta-success-body { font-size: 15px; color: rgba(255,255,255,0.5); line-height: 1.6; }
.dest-cta-signoff { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: rgba(255,255,255,0.3); }

/* ── BACK BUTTON ── */
.dest-back-btn {
  position: absolute; top: 32px; left: 80px; z-index: 10;
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  font-weight: 600; color: rgba(255,255,255,0.75);
  background: rgba(13,13,13,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 18px; border-radius: 100px;
  transition: color 0.2s, background 0.2s;
}
.dest-back-btn:hover { color: #fff; background: rgba(13,13,13,0.72); }

/* ── COMING SOON ── */
.dest-coming-soon-body { padding: 80px; }
.dest-coming-soon-inner {
  max-width: 520px; text-align: center;
  padding: 64px 48px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  margin: 0 auto;
}
.dest-cs-eyebrow {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--sun); margin-bottom: 14px;
}
.dest-cs-text {
  font-size: 16px; color: rgba(255,255,255,0.4); line-height: 1.65; margin-bottom: 28px;
}
.dest-cs-back {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--sun); font-weight: 600;
  border-bottom: 1px solid rgba(212,160,85,0.3); padding-bottom: 2px;
}
.dest-cs-back:hover { border-bottom-color: var(--sun); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .dest-glance-section { padding: 32px 32px 36px; }
  .dest-glance-grid { grid-template-columns: repeat(2, 1fr); }
  .dest-courses-grid { grid-template-columns: 1fr; }
  .dest-kbyg-grid { grid-template-columns: repeat(2, 1fr); }
  .dest-kbyg-item,
  .dest-kbyg-item:nth-child(4):nth-last-child(2),
  .dest-kbyg-item:nth-child(4):nth-last-child(2) ~ .dest-kbyg-item {
    grid-column: auto;
  }
  .dest-gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  nav { padding: 14px 24px; }
  .dest-back-btn { top: 20px; left: 24px; }
  .dest-hero { padding: 0 24px 56px; min-height: 72vh; }
  .dest-hero-name { font-size: clamp(40px, 12vw, 72px); }
  .dest-section { padding: 56px 24px; }
  .dest-glance-section { padding: 28px 24px 32px; }
  .dest-glance-grid { grid-template-columns: 1fr; }
  .dest-glance-cell { min-height: 0; padding: 18px 22px; }
  .dest-email-cta-section { padding: 48px 24px; }
  .dest-email-cta-inner { padding: 40px 24px; }
  .dest-coming-soon-body { padding: 48px 24px; }
  .dest-coming-soon-inner { padding: 40px 24px; }
  .dest-kbyg-grid { grid-template-columns: 1fr; }
  .dest-gallery-grid { grid-template-columns: 1fr; }
  .dest-cta-form { flex-direction: column; align-items: stretch; }
  .dest-cta-input { max-width: 100%; }
}
</style>
</head>

<div id="dest-page" style="padding-top:80px;"></div>

<script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/umd/photoswipe-lightbox.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/umd/photoswipe.umd.min.js"></script>

<script>
(async function() {
  const slug = window.location.pathname.replace('/destinations/', '').replace(/\/$/, '');
  let destinations = [];
  try {
    const res = await fetch('/destinations/data.json');
    destinations = await res.json();
  } catch(e) {}

  const dest = destinations.find(d => d.slug === slug);

  if (dest && dest.the_take) {
    renderFull(dest);
  } else {
    renderComingSoon(dest || { slug });
  }

  // Nav scroll + hamburger
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 80); }, { passive: true });
  document.getElementById('navHamburger').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('open');
  });

  // Inject JSON-LD for full destinations
  if (dest && dest.the_take) injectJsonLd(dest);
})();

/* ─────────────────────────────────────────────
   FULL DESTINATION RENDER
───────────────────────────────────────────── */
function renderFull(dest) {
  const page = document.getElementById('dest-page');
  page.innerHTML = [
    heroHTML(dest),
    glanceSectionHTML(dest),
    takeSectionHTML(dest),
    coursesSectionHTML(dest),
    staySectionHTML(dest),
    setupSectionHTML(dest),
    kbygSectionHTML(dest),
    skipSectionHTML(dest),
    gallerySectionHTML(dest),
    ctaSectionHTML()
  ].join('');

  wireCtaForm();
  initGallery(dest.gallery || []);
}

/* ─────────────────────────────────────────────
   COMING SOON RENDER
───────────────────────────────────────────── */
function renderComingSoon(dest) {
  const heroUrl = dest.hero_image || '';
  const bgStyle = heroUrl ? ` style="background-image:url('${heroUrl}')"` : '';
  const tags = (dest.location_tags || []).map(t => `<span class="dest-location-tag">${t}</span>`).join('');
  const name = dest.name || 'Coming Soon';

  document.getElementById('dest-page').innerHTML = `
    <div class="dest-hero">
      <div class="dest-hero-bg"${bgStyle}></div>
      <div class="dest-hero-overlay"></div>
      <a href="/cyntp-trips.html" class="dest-back-btn">← All Trips</a>

/* ─────────────────────────────────────────────
   SECTION HTML BUILDERS
───────────────────────────────────────────── */
function heroHTML(dest) {
  const bgStyle = dest.hero_image ? ` style="background-image:url('${dest.hero_image}')"` : '';
  const tags = (dest.location_tags || []).map(t => `<span class="dest-location-tag">${t}</span>`).join('');
  return `
    <div class="dest-hero">
      <div class="dest-hero-bg"${bgStyle}></div>
      <div class="dest-hero-overlay"></div>
      <a href="/cyntp-trips.html" class="dest-back-btn">← All Trips</a>
      <div class="dest-hero-content">
        ${tags ? `<div class="dest-location-tags">${tags}</div>` : ''}
        <h1 class="dest-hero-name">${esc(dest.name.toUpperCase())}</h1>
        ${dest.tagline ? `<p class="dest-hero-tagline">${esc(dest.tagline)}</p>` : ''}
      </div>
    </div>`;
}

function sectionLabel(label) {
  return `<div class="dest-section-label-wrap"><span class="dest-section-label">${label}</span></div>`;
}

function kbygValueByLabel(dest, labelKeywords) {
  if (!dest.know_before || !dest.know_before.length) return null;
  const keys = labelKeywords.map(k => k.toLowerCase());
  return dest.know_before.find(k =>
    keys.some(key => (k.label || '').toLowerCase().includes(key))
  ) || null;
}

function firstSentence(text) {
  if (!text) return '';
  const m = String(text).match(/^[^.!?]+[.!?](?=\s|$)/);
  return m ? m[0].trim() : String(text).trim();
}

function glanceSectionHTML(dest) {
  const courseCount = (dest.courses || []).length;
  const bestTime = kbygValueByLabel(dest, ['best time', 'season']);
  const flyInto = kbygValueByLabel(dest, ['fly into', 'airport']);
  const budget = kbygValueByLabel(dest, ['budget', 'cost']);

  const cells = [];

  if (courseCount) {
    cells.push({
      label: 'Courses',
      value: `${courseCount} ${courseCount === 1 ? 'Course' : 'Courses'}`,
      detail: dest.location_tags && dest.location_tags.length
        ? dest.location_tags.slice(0, 2).join(' · ')
        : ''
    });
  }
  if (bestTime) {
    cells.push({ label: 'Best Time', value: firstSentence(bestTime.value), detail: '' });
  }
  if (flyInto) {
    cells.push({ label: 'Fly Into', value: firstSentence(flyInto.value), detail: '' });
  }
  if (budget) {
    cells.push({ label: 'Budget', value: firstSentence(budget.value), detail: '' });
  }

  if (cells.length < 2) return '';

  const html = cells.map(c => `
    <div class="dest-glance-cell">
      <div class="dest-glance-label">${esc(c.label)}</div>
      <div class="dest-glance-value">${esc(c.value)}</div>
      ${c.detail ? `<div class="dest-glance-detail">${esc(c.detail)}</div>` : ''}
    </div>`).join('');

  return `
    <section class="dest-glance-section">
      <div class="dest-section-inner">
        <div class="dest-glance-grid">${html}</div>
      </div>
    </section>`;
}

function takeSectionHTML(dest) {
  const paras = (dest.the_take || []).map(p => `<p>${esc(p)}</p>`).join('');
  return `
    <section class="dest-section dest-section--narrow">
      <div class="dest-section-inner">
        ${sectionLabel('The Take')}
        <div class="dest-take-body">${paras}</div>
      </div>
    </section>`;
}

function coursesSectionHTML(dest) {
  if (!dest.courses || !dest.courses.length) return '';
  const items = dest.courses.map((c, i) => {
    const imgs = (c.images && c.images.length) ? c.images : (c.image ? [c.image] : []);
    let imgWrap = '';
    if (imgs.length) {
      const id = `destCourse${i}`;
      const arrows = imgs.length > 1
        ? `<button class="dest-course-img-arrow dest-course-img-arrow--prev" onclick="shiftDestCourseImg('${id}',-1)">&#8592;</button><button class="dest-course-img-arrow dest-course-img-arrow--next" onclick="shiftDestCourseImg('${id}',1)">&#8594;</button>`
        : '';
      imgWrap = `<div class="dest-course-image-wrap"><div id="${id}" class="dest-course-image" style="background-image:url('${esc(imgs[0])}')" data-imgs='${JSON.stringify(imgs)}' data-idx="0"></div>${arrows}</div>`;
    }
    return `
    <div class="dest-course-card">
      ${imgWrap}
      <div class="dest-course-body">
        <div class="dest-course-name">${esc(c.name)}</div>
        <div class="dest-course-designer">${esc(c.designer)}</div>
        <p class="dest-course-desc">${esc(c.description)}</p>
      </div>
    </div>`;
  }).join('');
  return `
    <section class="dest-section">
      <div class="dest-section-inner">
        ${sectionLabel('The Courses')}
        <div class="dest-courses-grid">${items}</div>
      </div>
    </section>`;
}

function staySectionHTML(dest) {
  if (!dest.where_to_stay) return '';
  const btn = dest.booking_link
    ? `<a href="${dest.booking_link}" target="_blank" rel="noopener noreferrer" class="dest-booking-btn">${esc(dest.booking_text || 'Book Your Stay →')}</a>`
    : '';
  return `
    <section class="dest-section dest-section--narrow">
      <div class="dest-section-inner">
        ${sectionLabel('Where to Stay')}
        <p class="dest-stay-body">${esc(dest.where_to_stay)}</p>
        ${btn}
      </div>
    </section>`;
}

function setupSectionHTML(dest) {
  if (!dest.setup || !dest.setup.length) return '';
  const items = dest.setup.map(s => `
    <div class="dest-setup-item">
      <div class="dest-setup-label">${esc(s.label)}</div>
      <p class="dest-setup-text">${esc(s.itinerary)}</p>
    </div>`).join('');
  return `
    <section class="dest-section dest-section--narrow">
      <div class="dest-section-inner">
        ${sectionLabel('The Setup')}
        <div class="dest-setup-items">${items}</div>
      </div>
    </section>`;
}

function kbygSectionHTML(dest) {
  if (!dest.know_before || !dest.know_before.length) return '';
  const items = dest.know_before.map(k => `
    <div class="dest-kbyg-item">
      <div class="dest-kbyg-label">${esc(k.label)}</div>
      <div class="dest-kbyg-value">${esc(k.value)}</div>
    </div>`).join('');
  return `
    <section class="dest-section">
      <div class="dest-section-inner">
        ${sectionLabel('Know Before You Go')}
        <div class="dest-kbyg-grid">${items}</div>
      </div>
    </section>`;
}

function skipSectionHTML(dest) {
  if (!dest.what_to_skip || !dest.what_to_skip.length) return '';
  const items = dest.what_to_skip.map(s => `
    <div>
      <div class="dest-skip-lead">${esc(s.lead)}</div>
      <p class="dest-skip-detail">${esc(s.detail)}</p>
    </div>`).join('');
  return `
    <section class="dest-section dest-section--narrow">
      <div class="dest-section-inner">
        ${sectionLabel('What to Skip')}
        <div class="dest-skip-items">${items}</div>
      </div>
    </section>`;
}

function gallerySectionHTML(dest) {
  const photos = (dest.gallery || []).filter(p => p && p.url);
  let gridHTML;
  if (!photos.length) {
    gridHTML = `<p class="dest-gallery-empty">Photos coming soon.</p>`;
  } else {
    const display = photos.slice(0, 9);
    const remaining = photos.length - 9;
    gridHTML = '<div class="dest-gallery-grid" id="destGallery">' +
      display.map((p, i) => {
        const thumb = cloudinaryThumb(p.url);
        const full = cloudinaryFull(p.url);
        const alt = esc(p.caption || 'Trip photo');
        const overlay = (i === 8 && remaining > 0)
          ? `<div class="gallery-more-overlay">+${remaining} more</div>` : '';
        // Use a reasonable square fallback; real dimensions are
        // probed in initGallery so each photo opens at its own aspect.
        return `<a class="dest-gallery-item" href="${full}" data-pswp-width="1600" data-pswp-height="1600" target="_blank">
          <img src="${thumb}" alt="${alt}" loading="lazy">${overlay}</a>`;
      }).join('') +
    '</div>';
  }
  return `
    <section class="dest-section">
      <div class="dest-section-inner">
        ${sectionLabel('From the Trip')}
        ${gridHTML}
      </div>
    </section>`;
}

function ctaSectionHTML() {
  return `
    <section class="dest-email-cta-section">
      <div class="dest-email-cta-inner" id="destEmailCta">
        <div class="dest-cta-eyebrow">Weekly Golf Intel</div>
        <h2 class="dest-cta-headline">JOIN THE COMMUNITY</h2>
        <p class="dest-cta-sub">Every Thursday — trip breakdowns, course intel, and travel finds from the CYNTP crew.</p>
        <form class="dest-cta-form" id="destCtaForm" novalidate>
          <input type="email" class="dest-cta-input" id="destCtaEmail" placeholder="your@email.com" autocomplete="email">
          <button type="submit" class="dest-cta-btn">JOIN THE COMMUNITY</button>
        </form>
      </div>
    </section>`;
}

/* ─────────────────────────────────────────────
   EMAIL CTA WIRING
───────────────────────────────────────────── */
function wireCtaForm() {
  const form = document.getElementById('destCtaForm');
  if (!form) return;
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = (document.getElementById('destCtaEmail') || {}).value || '';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) return;
    const btn = form.querySelector('button');
    btn.disabled = true; btn.textContent = 'Joining…';
    try {
      await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim().toLowerCase() })
      });
    } catch(_) {}
    document.getElementById('destEmailCta').innerHTML = `
      <div class="dest-cta-success-wrap">
        <div class="dest-cta-check">&#10003;</div>
        <h3 class="dest-cta-success-hed">You&rsquo;re in.</h3>
        <p class="dest-cta-success-body">See you Thursday with the best in golf travel.</p>
        <p class="dest-cta-signoff">&mdash; Cameron, Noah &amp; Beau</p>
      </div>`;
  });
}

/* ─────────────────────────────────────────────
   PHOTOSWIPE GALLERY
───────────────────────────────────────────── */
function initGallery(photos) {
  if (!photos.length) return;
  if (typeof PhotoSwipeLightbox === 'undefined') return;

  // Probe each full-size image so the lightbox opens at the photo's
  // true aspect ratio instead of a hardcoded 3:2 frame. PhotoSwipe
  // reads data-pswp-width/height when a tile is clicked, so updating
  // them as each preload resolves is enough — and the warm browser
  // cache makes the actual open instant.
  document.querySelectorAll('#destGallery a.dest-gallery-item').forEach(a => {
    const probe = new Image();
    probe.onload = () => {
      if (probe.naturalWidth && probe.naturalHeight) {
        a.setAttribute('data-pswp-width', probe.naturalWidth);
        a.setAttribute('data-pswp-height', probe.naturalHeight);
      }
    };
    probe.src = a.getAttribute('href');
  });

  const lightbox = new PhotoSwipeLightbox({
    gallery: '#destGallery',
    children: 'a.dest-gallery-item',
    pswpModule: PhotoSwipe
  });
  lightbox.init();
}

/* ─────────────────────────────────────────────
   JSON-LD
───────────────────────────────────────────── */
function injectJsonLd(dest) {
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'TouristAttraction',
    name: dest.name,
    description: dest.meta_description || dest.tagline,
    url: 'https://www.coursesyouneedtoplay.com/destinations/' + dest.slug,
    image: dest.hero_image,
    touristType: 'Golfers',
    address: {
      '@type': 'PostalAddress',
      addressRegion: dest.state,
      addressCountry: 'US'
    }
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
}

/* ─────────────────────────────────────────────
   COURSE IMAGE CAROUSEL
───────────────────────────────────────────── */
function shiftDestCourseImg(id, dir) {
  const el = document.getElementById(id);
  if (!el) return;
  const imgs = JSON.parse(el.dataset.imgs);
  let idx = (parseInt(el.dataset.idx) + dir + imgs.length) % imgs.length;
  el.dataset.idx = idx;
  el.style.backgroundImage = `url('${imgs[idx]}')`;
}

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function cloudinaryThumb(url) {
  if (url.includes('/upload/')) return url.replace('/upload/', '/upload/w_900,c_fill,ar_1:1,q_auto:best,f_auto/');
  return url;
}

function cloudinaryFull(url) {
  if (url.includes('/upload/')) return url.replace('/upload/', '/upload/w_1600,q_auto:best,f_auto/');
  return url;
}
